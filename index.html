<!DOCTYPE html>
<html lang="pt-br">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Diário Brawl Farm</title>

<link rel="stylesheet" href="style.css">

<link href="https://fonts.googleapis.com/css2?family=Luckiest+Guy&family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

</head>

<body>

<div class="container">

<h1 class="title">🏆 DIARIO BRAWL FARM 🥇</h1>
<p class="subtitle">campeonato farm diário • inscrições abertas</p>

<!-- STATUS -->

<div class="card">

<div class="stats">

<div class="stat">
<span>Vagas</span>
<h2 id="vagas">9</h2>
</div>

<div class="stat">
<span>Inscritos</span>
<h2 id="inscritos">0</h2>
</div>

<div class="stat">
<span>Restantes</span>
<h2 id="restantes">9</h2>
</div>

</div>

<div class="progressBar">
<div class="progress" id="progress"></div>
</div>

<div id="alert"></div>

</div>

<!-- ENTRAR -->

<div class="card">

<h3>Entrar no campeonato</h3>

<input id="nome" placeholder="Seu nome">
<input id="celular" placeholder="Seu celular">

<button class="neonButton" onclick="entrar()">Entrar</button>

</div>

<!-- JOGADORES -->

<div class="card">

<h3>Jogadores inscritos</h3>

<div id="lista"></div>

</div>

<!-- RANKING -->

<div class="card">

<h3>Ranking — jogadores mais ativos</h3>

<div id="ranking"></div>

</div>

<!-- ADMIN -->

<button class="adminButton" onclick="abrirAdmin()">⚙ Área do admin</button>

<div class="adminPanel" id="admin">

<div class="card">

<h3>🔑 Login admin</h3>

<input id="senhaAdmin" placeholder="Senha do admin">

<button class="neonButton" onclick="loginAdmin()">Entrar como admin</button>

</div>

<div id="adminArea" style="display:none">

<div class="card">

<h3>Painel admin</h3>

<button onclick="limpar()">Limpar lista</button>
<button onclick="resetRanking()">Resetar ranking</button>

<div id="adminLista"></div>

</div>

</div>

</div>

</div>

<script src="script.js"></script>

</body>
</html>
