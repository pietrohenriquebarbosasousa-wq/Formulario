
<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>🏆 DIARIO BRAWL FARM</title>

<link href="https://fonts.googleapis.com/css2?family=Luckiest+Guy&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:Poppins;
background:#0b0e18;
color:white;
overflow-x:hidden;
}

/* LOADING */

#loading{
position:fixed;
width:100%;
height:100%;
background:#0b0e18;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
z-index:999;
}

.loader{
border:6px solid #222;
border-top:6px solid orange;
border-radius:50%;
width:60px;
height:60px;
animation:spin 1s linear infinite;
}

@keyframes spin{
0%{transform:rotate(0deg)}
100%{transform:rotate(360deg)}
}

/* STATUS */

.status{
position:fixed;
top:10px;
right:10px;
background:#14182c;
padding:8px 14px;
border-radius:20px;
font-size:13px;
}

.dot{
width:10px;
height:10px;
background:#00ff9c;
display:inline-block;
border-radius:50%;
margin-right:6px;
box-shadow:0 0 10px #00ff9c;
}

/* LAYOUT */

.container{
max-width:900px;
margin:auto;
padding:20px;
}

.title{
font-family:'Luckiest Guy';
font-size:40px;
text-align:center;
color:#ffd54a;
text-shadow:0 0 20px orange;
}

.subtitle{
text-align:center;
opacity:.7;
margin-bottom:25px;
}

.card{
background:#14182c;
padding:20px;
border-radius:15px;
margin-bottom:20px;
box-shadow:0 0 20px rgba(255,170,0,.2);
}

input{
width:100%;
padding:14px;
margin-top:10px;
border:none;
border-radius:10px;
background:#0f1322;
color:white;
}

button{
width:100%;
padding:14px;
border:none;
border-radius:10px;
background:linear-gradient(90deg,#ff9800,#ffd54a);
font-weight:600;
cursor:pointer;
box-shadow:0 0 10px orange;
}

button:hover{
transform:scale(1.02);
}

/* RANKING */

.rank{
display:flex;
justify-content:space-between;
background:#10152a;
padding:12px;
border-radius:10px;
margin-bottom:10px;
}

.first{
background:linear-gradient(90deg,#ff9800,#ffd54a);
color:black;
font-weight:bold;
box-shadow:0 0 15px gold;
}

/* PIX SCREEN */

.pixScreen{
position:fixed;
bottom:-100%;
left:0;
width:100%;
height:100%;
background:#0b0e18;
padding:30px;
transition:1s;
overflow:auto;
}

.pixScreen.show{
bottom:0;
}

.pixBox{
background:#14182c;
padding:25px;
border-radius:15px;
text-align:center;
box-shadow:0 0 20px rgba(255,200,0,.4);
}

.pixKey{
background:#0f1322;
padding:15px;
border-radius:10px;
margin:15px 0;
letter-spacing:3px;
}

/* TABLE */

table{
width:100%;
border-collapse:collapse;
}

td,th{
padding:10px;
border-bottom:1px solid #333;
text-align:left;
}

/* NOTIFICATION */

#notify{
position:fixed;
bottom:20px;
right:20px;
background:#1b213f;
padding:15px;
border-radius:10px;
display:none;
}

</style>
</head>

<body>

<div id="loading">
<div class="loader"></div>
<p>Conectando ao sistema...</p>
</div>

<div class="status">
<span class="dot"></span> Conectado
</div>

<div class="container">

<div class="title">🏆DIARIO BRAWL FARM🥇</div>
<div class="subtitle">campeonato diário • vagas limitadas</div>

<div class="card">

<h3>Inscrição</h3>

<input id="nome" placeholder="Seu nome">

<input id="numero" placeholder="Seu número">

<input id="nick" placeholder="Nick do Brawl Stars" style="display:none">

<button onclick="inscrever()">Entrar</button>

</div>

<div class="card">

<h3>Ranking</h3>

<div id="ranking"></div>

</div>

<div class="card">

<h3>Inscritos</h3>

<table id="tabela">

<tr>
<th>Nick</th>
<th>Partidas</th>
</tr>

</table>

</div>

<div class="card">

<button onclick="abrirAdmin()">⚙ Área do Admin</button>

</div>

</div>

<div class="pixScreen" id="pixScreen">

<div class="pixBox">

<h2>✔ Vaga garantida!</h2>

<p>Valor da inscrição</p>

<h1 id="valor">R$5,00</h1>

<p>Chave Pix</p>

<div class="pixKey" id="pixKey">98981980358</div>

<button onclick="copiarPix()">Copiar chave Pix</button>

<p id="salaStatus">🔒 Link da sala ainda não liberado</p>

</div>

</div>

<div id="notify"></div>

<script>

setTimeout(()=>{
document.getElementById("loading").style.display="none"
},2000)

let jogadores=JSON.parse(localStorage.getItem("jogadores")||"[]")

let nome=document.getElementById("nome")
let numero=document.getElementById("numero")
let nick=document.getElementById("nick")

nome.oninput=numero.oninput=()=>{
if(nome.value && numero.value){
nick.style.display="block"
}
}

function inscrever(){

if(localStorage.getItem("inscrito")){
alert("Você já se inscreveu")
return
}

let player={
nick:nick.value,
partidas:Math.floor(Math.random()*10)
}

jogadores.push(player)

localStorage.setItem("jogadores",JSON.stringify(jogadores))
localStorage.setItem("inscrito",true)

document.getElementById("pixScreen").classList.add("show")

notificar("🎮 "+player.nick+" entrou no campeonato!")

render()

}

function render(){

jogadores.sort((a,b)=>b.partidas-a.partidas)

let ranking=""
let tabela=""

jogadores.forEach((p,i)=>{

let pos=i+1

let cls="rank"

if(pos==1) cls+=" first"

ranking+=`
<div class="${cls}">
<span>${pos}º ${p.nick}</span>
<span>${p.partidas} partidas</span>
</div>
`

tabela+=`
<tr>
<td>${p.nick}</td>
<td>${p.partidas}</td>
</tr>
`

})

document.getElementById("ranking").innerHTML=ranking
document.getElementById("tabela").innerHTML+=tabela

}

render()

function copiarPix(){

navigator.clipboard.writeText("98981980358")

notificar("Pix copiado!")

}

function notificar(msg){

let n=document.getElementById("notify")

n.innerText=msg

n.style.display="block"

setTimeout(()=>{

n.style.display="none"

},3000)

}

function abrirAdmin(){

let senha=prompt("Senha admin")

if(senha==="ph2011jesus"){

alert("Admin logado")

}

}

</script>

</body>
</html>
