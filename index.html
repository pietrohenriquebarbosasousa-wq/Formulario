<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Diário Brawl</title>

<style>
body {
  background: #000;
  color: white;
  font-family: Arial;
  text-align: center;
}

h1 {
  color: orange;
  text-shadow: 0 0 15px orange;
}

.box {
  background: #111;
  padding: 20px;
  border-radius: 15px;
  margin: 20px;
  box-shadow: 0 0 20px orange;
}

input {
  padding: 10px;
  margin: 5px;
  border-radius: 8px;
  border: none;
}

button {
  background: #00ff88;
  padding: 10px;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  box-shadow: 0 0 10px #00ff88;
}

.progress {
  width: 100%;
  height: 20px;
  background: #222;
  border-radius: 10px;
  margin-top: 10px;
}

.bar {
  height: 100%;
  width: 0%;
  background: #00ff88;
  border-radius: 10px;
}

.admin-box {
  background: linear-gradient(to bottom, #ccc, #222);
  box-shadow: 0 0 15px #aaa;
}

.admin {
  display: none;
}
</style>

</head>

<body>

<h1>🔥 Diário Brawl 🔥</h1>

<div class="box">
  <p id="contador">0/9 jogadores</p>
  <div class="progress"><div class="bar" id="bar"></div></div>

  <h3>Inscreva-se</h3>
  <input id="tel" placeholder="Telefone">
  <br>
  <input id="nick" placeholder="Nick do Brawl">
  <br>
  <button onclick="inscrever()">Participar</button>
</div>

<div class="box">
  <h3>👥 Inscritos</h3>
  <table style="width:100%">
    <thead>
      <tr><th>Telefone</th><th>Nick</th></tr>
    </thead>
    <tbody id="lista"></tbody>
  </table>
</div>

<div class="box admin-box">
  <h3>⚙️ Área do Admin</h3>
  <input id="codigo" placeholder="Código">
  <button onclick="login()">Entrar</button>

  <div id="painel" class="admin">
    <button onclick="limpar()">Limpar lista</button>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDojDC2JgaKjEEVnpZwfISWiUI7JevhzV8",
  authDomain: "diario-brawl-87d1c.firebaseapp.com",
  projectId: "diario-brawl-87d1c",
  storageBucket: "diario-brawl-87d1c.firebasestorage.app",
  messagingSenderId: "518573443166",
  appId: "1:518573443166:web:6532683506fb98398bcccf"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const max = 9;

async function carregar() {
  const querySnapshot = await getDocs(collection(db, "players"));
  let lista = document.getElementById("lista");
  lista.innerHTML = "";

  let count = 0;

  querySnapshot.forEach((docSnap) => {
    let d = docSnap.data();
    lista.innerHTML += `<tr><td>${d.tel}</td><td>${d.nick}</td></tr>`;
    count++;
  });

  document.getElementById("contador").innerText = count + "/" + max + " jogadores";
  document.getElementById("bar").style.width = (count/max)*100 + "%";
}

window.inscrever = async function() {
  let tel = document.getElementById("tel").value;
  let nick = document.getElementById("nick").value;

  if(!tel || !nick) return alert("Preencha tudo!");

  await addDoc(collection(db, "players"), { tel, nick });

  carregar();
}

window.login = function() {
  if(document.getElementById("codigo").value === "ph2011jesus") {
    document.getElementById("painel").style.display = "block";
  }
}

window.limpar = async function() {
  const querySnapshot = await getDocs(collection(db, "players"));
  querySnapshot.forEach(async (d) => {
    await deleteDoc(doc(db, "players", d.id));
  });
  carregar();
}

carregar();
</script>

</body>
</html>
