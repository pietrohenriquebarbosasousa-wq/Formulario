<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Diário Brawl Farm</title>

<link href="https://fonts.googleapis.com/css2?family=Luckiest+Guy&family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:Poppins;
background:linear-gradient(180deg,#0c0d16,#151935);
color:white;
}

/* LOADING */

#loading{
position:fixed;
width:100%;
height:100%;
background:#0c0d16;
display:flex;
align-items:center;
justify-content:center;
z-index:9999;
flex-direction:column;
}

.spinner{
width:45px;
height:45px;
border:4px solid rgba(255,255,255,.1);
border-top:4px solid orange;
border-radius:50%;
animation:spin 1s linear infinite;
margin-bottom:10px;
}

@keyframes spin{
0%{transform:rotate(0)}
100%{transform:rotate(360deg)}
}

/* STATUS */

#status{
position:fixed;
top:15px;
right:15px;
background:#1b1f38;
padding:6px 12px;
border-radius:20px;
font-size:12px;
display:flex;
gap:6px;
align-items:center;
}

.dot{
width:8px;
height:8px;
background:#00ff66;
border-radius:50%;
box-shadow:0 0 8px #00ff66;
}

/* LAYOUT */

.container{
max-width:900px;
margin:auto;
padding:20px;
}

.title{
font-family:'Luckiest Guy';
font-size:40px;
text-align:center;
color:#ffd000;
text-shadow:0 0 15px orange;
}

.subtitle{
text-align:center;
opacity:.6;
margin-bottom:30px;
}

.card{
background:#1b1f38;
padding:20px;
border-radius:15px;
margin-bottom:20px;
box-shadow:0 0 20px rgba(0,0,0,.5);
}

/* STATS */

.stats{
display:flex;
gap:10px;
}

.stat{
flex:1;
background:#262b54;
padding:15px;
border-radius:10px;
text-align:center;
}

/* PROGRESS */

.progressBar{
height:12px;
background:#2b2f63;
border-radius:20px;
margin-top:10px;
overflow:hidden;
}

.progress{
height:100%;
width:0%;
background:linear-gradient(90deg,#ff7a00,#ffd000);
transition:.4s;
}

/* INPUTS */

input{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:8px;
background:#2b2f63;
color:white;
}

/* BUTTON */

.button{
margin-top:15px;
width:100%;
padding:14px;
border:none;
border-radius:15px;
font-weight:600;
background:linear-gradient(90deg,#ff7a00,#ffd000);
cursor:pointer;
box-shadow:0 0 20px orange;
}

.button:hover{
transform:scale(1.03);
}

/* PLAYERS */

.player{
background:#262b54;
padding:12px;
margin-top:8px;
border-radius:10px;
display:flex;
justify-content:space-between;
align-items:center;
}

/* RANKING */

.rank{
background:#262b54;
padding:12px;
margin-top:8px;
border-radius:10px;
display:flex;
justify-content:space-between;
}

.gold{border:2px solid gold;}
.silver{border:2px solid silver;}
.bronze{border:2px solid #cd7f32;}

/* ADMIN */

.adminPanel{
display:none;
}

.smallBtn{
padding:5px 10px;
border:none;
border-radius:8px;
cursor:pointer;
background:orange;
color:black;
}

/* EXIT BUTTON */

#sairBtn{
position:fixed;
bottom:20px;
right:20px;
background:red;
color:white;
padding:10px 14px;
border-radius:25px;
cursor:pointer;
box-shadow:0 0 15px red;
display:none;
}

.linkBtn{
background:#00c3ff;
padding:6px 10px;
border-radius:8px;
text-decoration:none;
color:white;
}

</style>
</head>

<body>

<div id="loading">
<div class="spinner"></div>
<p>Conectando ao sistema...</p>
</div>

<div id="status">
<span class="dot"></span>Conectado
</div>

<div class="container">

<div class="title">🏆 DIÁRIO BRAWL FARM</div>
<div class="subtitle">campeonato farm diário</div>

<div class="card">

<div class="stats">

<div class="stat">
VAGAS
<h2 id="vagas">9</h2>
</div>

<div class="stat">
INSCRITOS
<h2 id="inscritos">0</h2>
</div>

<div class="stat">
RESTANTES
<h2 id="restantes">9</h2>
</div>

</div>

<div class="progressBar">
<div class="progress" id="progress"></div>
</div>

</div>

<div class="card">

<h3>Inscrição</h3>

<input id="nome" placeholder="Ex: Pedro Oliveira">
<input id="celular" placeholder="Ex: 21987654321">

<div id="brawlDiv" style="display:none">
<input id="brawl" placeholder="Nome no Brawl Stars">
<button class="button" onclick="confirmar()">Confirmar inscrição</button>
</div>

</div>

<div class="card">
<h3>Jogadores inscritos</h3>
<div id="lista"></div>
</div>

<div class="card">
<h3>Ranking</h3>
<div id="ranking"></div>
</div>

<div class="card">
<h3>Link da sala</h3>
<div id="linkArea">Aguardando liberação do admin...</div>
</div>

<button class="button" onclick="abrirAdmin()">Área admin</button>

<div class="card adminPanel" id="admin">

<input id="senhaAdmin" placeholder="Senha admin">
<button class="button" onclick="loginAdmin()">Entrar</button>

<div id="adminArea" style="display:none">

<h3>Link da sala</h3>

<input id="linkSala" placeholder="Cole o link da sala">
<button class="button" onclick="salvarLink()">Salvar link</button>

<h3>Jogadores</h3>
<div id="adminLista"></div>

</div>

</div>

</div>

<div id="sairBtn" onclick="sair()">❌ Sair da partida</div>

<script>

setTimeout(()=>{
document.getElementById("loading").style.display="none"
},1800)

let jogadores=JSON.parse(localStorage.getItem("jogadores"))||[]
let ranking=JSON.parse(localStorage.getItem("ranking"))||{}
let linkSala=localStorage.getItem("linkSala")||""

document.getElementById("nome").addEventListener("input",checkCampos)
document.getElementById("celular").addEventListener("input",checkCampos)

function checkCampos(){

let nome=document.getElementById("nome").value
let cel=document.getElementById("celular").value

if(nome.length>2 && cel.length>7){

document.getElementById("brawlDiv").style.display="block"

}

}

function confirmar(){

if(localStorage.getItem("inscrito")){
alert("Você já está inscrito")
return
}

let nome=document.getElementById("nome").value
let brawl=document.getElementById("brawl").value

jogadores.push({nome,brawl,liberado:false})

ranking[nome]=(ranking[nome]||0)+1

localStorage.setItem("inscrito","true")

salvar()

document.getElementById("sairBtn").style.display="block"

}

function salvar(){

localStorage.setItem("jogadores",JSON.stringify(jogadores))
localStorage.setItem("ranking",JSON.stringify(ranking))

render()

}

function render(){

let lista=document.getElementById("lista")
let adminLista=document.getElementById("adminLista")

lista.innerHTML=""
adminLista.innerHTML=""

jogadores.forEach((j,i)=>{

let div=document.createElement("div")
div.className="player"

div.innerHTML=`${j.nome} (${j.brawl})`

if(j.liberado && linkSala){
div.innerHTML+=` <a class="linkBtn" href="${linkSala}" target="_blank">Entrar</a>`
}

lista.appendChild(div)

let adminDiv=document.createElement("div")

adminDiv.className="player"

adminDiv.innerHTML=`${j.nome}

<button class="smallBtn" onclick="liberar(${i})">Liberar link</button>

<button class="smallBtn" onclick="remover(${i})">Remover</button>
`

adminLista.appendChild(adminDiv)

})

}

function liberar(i){

jogadores[i].liberado=true

salvar()

}

function remover(i){

jogadores.splice(i,1)

salvar()

}

function sair(){

localStorage.removeItem("inscrito")

location.reload()

}

function abrirAdmin(){

document.getElementById("admin").style.display="block"

}

function loginAdmin(){

if(document.getElementById("senhaAdmin").value=="ph2011jesus"){

document.getElementById("adminArea").style.display="block"

}

}

function salvarLink(){

linkSala=document.getElementById("linkSala").value

localStorage.setItem("linkSala",linkSala)

render()

}

render()

</script>

</body>
</html>
