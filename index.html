<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Diário Brawl Farm</title>

<link href="https://fonts.googleapis.com/css2?family=Luckiest+Guy&family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:Poppins;
background:linear-gradient(180deg,#0c0d16,#141833);
color:white;
}

/* loading */

#loadingScreen{
position:fixed;
width:100%;
height:100%;
background:#0c0d16;
display:flex;
align-items:center;
justify-content:center;
z-index:9999;
}

.loadingBox{
text-align:center;
color:#ffd000;
}

.spinner{
width:40px;
height:40px;
border:4px solid rgba(255,255,255,.1);
border-top:4px solid orange;
border-radius:50%;
animation:spin 1s linear infinite;
margin:auto;
margin-bottom:15px;
}

@keyframes spin{
0%{transform:rotate(0)}
100%{transform:rotate(360deg)}
}

/* status */

#statusOnline{
position:fixed;
top:15px;
right:15px;
background:#1b1f38;
padding:6px 12px;
border-radius:20px;
font-size:12px;
display:flex;
align-items:center;
gap:6px;
}

.dot{
width:8px;
height:8px;
background:#00ff66;
border-radius:50%;
box-shadow:0 0 8px #00ff66;
}

/* layout */

.container{
max-width:900px;
margin:auto;
padding:20px;
}

.title{
font-family:'Luckiest Guy';
font-size:40px;
text-align:center;
color:#ffd000;
text-shadow:0 0 20px orange;
}

.subtitle{
text-align:center;
opacity:.6;
margin-bottom:30px;
}

.card{
background:#1b1f38;
padding:20px;
border-radius:15px;
margin-bottom:20px;
box-shadow:0 0 20px rgba(0,0,0,.5);
}

.stats{
display:flex;
gap:10px;
}

.stat{
flex:1;
background:#262b54;
padding:15px;
border-radius:10px;
text-align:center;
}

.progressBar{
height:12px;
background:#2b2f63;
border-radius:20px;
margin-top:10px;
overflow:hidden;
}

.progress{
height:100%;
width:0%;
background:linear-gradient(90deg,#ff7a00,#ffd000);
transition:.5s;
}

.alert{
background:#4a3a17;
color:#ffd000;
padding:10px;
border-radius:10px;
margin-top:10px;
text-align:center;
}

input{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:8px;
background:#2b2f63;
color:white;
}

.loginButton{
margin-top:15px;
width:100%;
padding:14px;
border:none;
border-radius:15px;
font-weight:600;
background:linear-gradient(90deg,#ff7a00,#ffd000);
cursor:pointer;
box-shadow:0 0 20px orange;
}

.player{
background:#262b54;
padding:12px;
margin-top:8px;
border-radius:10px;
display:flex;
justify-content:space-between;
}

.rank{
background:#262b54;
padding:12px;
margin-top:8px;
border-radius:10px;
display:flex;
justify-content:space-between;
}

.gold{border:2px solid gold;}
.silver{border:2px solid silver;}
.bronze{border:2px solid #cd7f32;}

.adminButton{
display:block;
margin:25px auto;
padding:12px 25px;
border:none;
border-radius:25px;
background:#6c7194;
color:white;
cursor:pointer;
}

.adminPanel{
display:none;
}

</style>
</head>

<body>

<div id="loadingScreen">
<div class="loadingBox">
<div class="spinner"></div>
<p>Conectando ao sistema...</p>
</div>
</div>

<div id="statusOnline">
<span class="dot"></span>Conectado
</div>

<div class="container">

<div class="title">🏆 DIARIO BRAWL FARM 🥇</div>
<div class="subtitle">campeonato farm diário • vagas limitadas</div>

<div class="card">

<div class="stats">

<div class="stat">
VAGAS
<h2 id="vagas">9</h2>
</div>

<div class="stat">
INSCRITOS
<h2 id="inscritos">0</h2>
</div>

<div class="stat">
RESTANTES
<h2 id="restantes">9</h2>
</div>

</div>

<div class="progressBar">
<div class="progress" id="progress"></div>
</div>

<div id="alerta"></div>

</div>

<div class="card">

<h3>➡ Entrar</h3>

<p style="opacity:.6">
Faça login para se inscrever no campeonato. Use seu nome e celular.
</p>

<label>SEU NOME COMPLETO</label>
<input id="nome" placeholder="Ex: Pedro Oliveira">

<label>SEU CELULAR (SÓ NÚMEROS)</label>
<input id="celular" placeholder="Ex: 21987654321">

<button class="loginButton" onclick="entrar()">➡ Entrar</button>

</div>

<div class="card">
<h3>Jogadores inscritos</h3>
<div id="lista"></div>
</div>

<div class="card">
<h3>Ranking — Jogadores mais ativos</h3>
<div id="ranking"></div>
</div>

<button class="adminButton" onclick="abrirAdmin()">⚙ Área do admin</button>

<div class="card adminPanel" id="admin">

<h3>🔑 Login admin</h3>

<input id="senhaAdmin" placeholder="Digite a senha">

<button class="loginButton" onclick="loginAdmin()">Entrar como admin</button>

<div id="adminArea" style="display:none">

<h3>Painel admin</h3>

<label>Quantidade de vagas</label>
<input id="novaVagas" type="number">

<button class="loginButton" onclick="alterarVagas()">Atualizar vagas</button>

<button class="loginButton" onclick="toggleInscricao()">Abrir / Fechar inscrições</button>

<button class="loginButton" onclick="limpar()">Limpar lista</button>

<button class="loginButton" onclick="resetRanking()">Resetar ranking</button>

<div id="adminLista"></div>

</div>

</div>

</div>

<script>

setTimeout(()=>{
document.getElementById("loadingScreen").style.display="none"
},1800)

let vagasTotal=localStorage.getItem("vagasTotal")||9
let inscricoesAbertas=localStorage.getItem("inscricoes")||"true"

let jogadores=JSON.parse(localStorage.getItem("jogadores"))||[]
let ranking=JSON.parse(localStorage.getItem("ranking"))||{}

function salvar(){
localStorage.setItem("jogadores",JSON.stringify(jogadores))
localStorage.setItem("ranking",JSON.stringify(ranking))
localStorage.setItem("vagasTotal",vagasTotal)
localStorage.setItem("inscricoes",inscricoesAbertas)
}

function atualizar(){

let inscritos=jogadores.length
let restantes=vagasTotal-inscritos

document.getElementById("vagas").innerText=vagasTotal
document.getElementById("inscritos").innerText=inscritos
document.getElementById("restantes").innerText=restantes

let percent=(inscritos/vagasTotal)*100
document.getElementById("progress").style.width=percent+"%"

let alerta=document.getElementById("alerta")

if(restantes<=3 && restantes>0){
alerta.innerHTML="<div class='alert'>⚠ Quase cheio — Restam "+restantes+" vagas</div>"
}else{
alerta.innerHTML=""
}

let lista=document.getElementById("lista")
lista.innerHTML=""

jogadores.forEach((j,i)=>{
let div=document.createElement("div")
div.className="player"
div.innerHTML=`${i+1}º ${j.nome}`
lista.appendChild(div)
})

let r=document.getElementById("ranking")
r.innerHTML=""

let sorted=Object.entries(ranking).sort((a,b)=>b[1]-a[1])

sorted.forEach((p,i)=>{

let medalha=""
let classe="rank"

if(i==0){medalha="🥇";classe+=" gold"}
if(i==1){medalha="🥈";classe+=" silver"}
if(i==2){medalha="🥉";classe+=" bronze"}

let div=document.createElement("div")
div.className=classe
div.innerHTML=`${medalha} ${p[0]} <span>${p[1]} partidas</span>`

r.appendChild(div)

})

adminLista()

}

function entrar(){

if(localStorage.getItem("jaInscrito")){
alert("Você já se inscreveu")
return
}

if(inscricoesAbertas!="true"){
alert("Inscrições fechadas")
return
}

let nome=document.getElementById("nome").value.trim()

if(!nome){
alert("Digite seu nome")
return
}

let existe=jogadores.find(j=>j.nome.toLowerCase()===nome.toLowerCase())

if(existe){
alert("Esse nome já está inscrito")
return
}

if(jogadores.length>=vagasTotal){
alert("Sem vagas")
return
}

jogadores.push({nome})

ranking[nome]=(ranking[nome]||0)+1

localStorage.setItem("jaInscrito","true")

salvar()
atualizar()

}

function abrirAdmin(){
document.getElementById("admin").style.display="block"
}

function loginAdmin(){

let senha=document.getElementById("senhaAdmin").value

if(senha=="ph2011jesus"){
document.getElementById("adminArea").style.display="block"
}else{
alert("Senha incorreta")
}

}

function alterarVagas(){

let v=document.getElementById("novaVagas").value

if(v>0){
vagasTotal=v
salvar()
atualizar()
}

}

function toggleInscricao(){

inscricoesAbertas=inscricoesAbertas=="true"?"false":"true"

salvar()
atualizar()

}

function limpar(){

jogadores=[]
localStorage.removeItem("jaInscrito")

salvar()
atualizar()

}

function resetRanking(){

ranking={}
salvar()
atualizar()

}

function adminLista(){

let a=document.getElementById("adminLista")
if(!a)return

a.innerHTML=""

jogadores.forEach((j,i)=>{

let div=document.createElement("div")
div.className="player"
div.innerHTML=`${j.nome} <button onclick="remover(${i})">❌</button>`

a.appendChild(div)

})

}

function remover(i){

jogadores.splice(i,1)
salvar()
atualizar()

}

atualizar()

</script>

</body>
</html>
