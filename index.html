```html
<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Brawl Farm Championship</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:Poppins;
background:#070812;
color:white;
}

.container{
max-width:900px;
margin:auto;
padding:20px;
}

.title{
text-align:center;
font-size:38px;
font-weight:700;
color:#ffb300;
text-shadow:0 0 20px #ff9900;
margin-bottom:20px;
}

.card{
background:#0f1124;
border-radius:16px;
padding:20px;
margin-bottom:20px;
box-shadow:0 0 20px rgba(255,150,0,.2);
}

input{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:10px;
background:#1a1c35;
color:white;
}

button{
margin-top:12px;
padding:12px;
width:100%;
border:none;
border-radius:10px;
background:linear-gradient(90deg,#ff7b00,#ffd000);
font-weight:600;
cursor:pointer;
box-shadow:0 0 10px orange;
}

button:hover{
transform:scale(1.02);
}

.player{
display:flex;
justify-content:space-between;
background:#1a1c35;
padding:10px;
border-radius:8px;
margin-top:6px;
}

.smallBtn{
width:auto;
padding:6px 10px;
margin-left:6px;
}

.exit{
position:fixed;
bottom:20px;
right:20px;
background:red;
box-shadow:0 0 15px red;
}

.linkBox{
margin-top:10px;
padding:10px;
background:#141631;
border-radius:8px;
}

.admin{
display:none;
}

</style>
</head>

<body>

<div class="container">

<div class="title">🏆 BRAWL FARM</div>

<div class="card">

<h3>Inscrição</h3>

<input id="nome" placeholder="Ex: Pedro Oliveira">

<input id="celular" placeholder="Ex: 21987654321">

<div id="brawlDiv" style="display:none">

<input id="brawl" placeholder="Nome no Brawl Stars">

<button onclick="confirmar()">Confirmar inscrição</button>

</div>

</div>

<div class="card">

<h3>Jogadores inscritos</h3>

<div id="lista"></div>

</div>

<div class="card">

<h3>Link da sala</h3>

<div id="sala"></div>

</div>

<button onclick="abrirAdmin()">Área admin</button>

<div class="card admin" id="adminPanel">

<h3>Login admin</h3>

<input id="senhaAdmin" placeholder="Senha">

<button onclick="loginAdmin()">Entrar</button>

<div id="adminArea" style="display:none">

<h3>Configurar sala</h3>

<input id="linkSala" placeholder="Cole o link da sala">

<button onclick="salvarLink()">Salvar link</button>

<h3>Jogadores</h3>

<div id="adminLista"></div>

</div>

</div>

</div>

<button class="exit" onclick="sair()">❌ Sair da partida</button>

<script>

let jogadores=JSON.parse(localStorage.getItem("jogadores"))||[]
let linkSala=localStorage.getItem("linkSala")||""

document.getElementById("nome").addEventListener("input",checkCampos)
document.getElementById("celular").addEventListener("input",checkCampos)

function checkCampos(){

let nome=document.getElementById("nome").value
let cel=document.getElementById("celular").value

if(nome.length>2 && cel.length>7){

document.getElementById("brawlDiv").style.display="block"

}

}

function confirmar(){

if(localStorage.getItem("inscrito")){

alert("Você já está inscrito")
return

}

let nome=document.getElementById("nome").value
let brawl=document.getElementById("brawl").value

jogadores.push({
nome,
brawl,
liberado:false
})

localStorage.setItem("inscrito","true")

salvar()

}

function salvar(){

localStorage.setItem("jogadores",JSON.stringify(jogadores))

render()

}

function render(){

let lista=document.getElementById("lista")
let adminLista=document.getElementById("adminLista")

lista.innerHTML=""
adminLista.innerHTML=""

jogadores.forEach((j,i)=>{

let div=document.createElement("div")
div.className="player"

div.innerHTML=`
${j.nome} (${j.brawl})
`

if(j.liberado && linkSala){

div.innerHTML+=`<a href="${linkSala}" target="_blank">🔗 Entrar</a>`

}

lista.appendChild(div)

let adminDiv=document.createElement("div")
adminDiv.className="player"

adminDiv.innerHTML=`
${j.nome}

<button class="smallBtn" onclick="liberar(${i})">Liberar</button>
<button class="smallBtn" onclick="remover(${i})">Remover</button>
`

adminLista.appendChild(adminDiv)

})

}

function liberar(i){

jogadores[i].liberado=true

salvar()

}

function remover(i){

jogadores.splice(i,1)

salvar()

}

function sair(){

localStorage.removeItem("inscrito")

alert("Você saiu da partida")

location.reload()

}

function abrirAdmin(){

document.getElementById("adminPanel").style.display="block"

}

function loginAdmin(){

if(document.getElementById("senhaAdmin").value=="ph2011jesus"){

document.getElementById("adminArea").style.display="block"

}

}

function salvarLink(){

linkSala=document.getElementById("linkSala").value

localStorage.setItem("linkSala",linkSala)

render()

}

render()

</script>

</body>
</html>
```
